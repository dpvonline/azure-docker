name: dpv-core

networks:
  dpv:
    name: dpv
    driver: bridge

volumes:
  caddy_data:
  caddy_config:

services:
  caddy:
    image: caddy:2.9-alpine
    restart: unless-stopped
    networks:
      - dpv
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN_AUTH: ${DOMAIN_AUTH}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

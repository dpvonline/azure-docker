services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.7
    restart: unless-stopped
    depends_on:
      - postgres
    networks:
      - dpv
    command: ["start"]
    environment:
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: "xforwarded"
      KC_HOSTNAME: "https://${DOMAIN_AUTH}"
      KC_DB: postgres
      KC_DB_URL: "jdbc:postgresql://postgres:5432/keycloak"
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${POSTGRES_KEYCLOAK_PASSWORD}
      KC_HEALTH_ENABLED: "true"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    # Port 9000 (health/management) and 8080 (http) are intentionally not
    # published — Caddy reaches them over the internal "dpv" network only.
